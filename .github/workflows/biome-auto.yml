name: Biome Automatic Formatter

on:
  push:
    branches: [ "main" ]

jobs:
  biome-autofix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'


      - name: Uruchom Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Automatyczna naprawa plikow
        run: |
          biome check --write --unsafe .
      - name: Automatyczny zapis poprawek do repozytorium
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automatyczna naprawa kodu przez Biome"
